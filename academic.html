<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="academic_page_title">Termiz Davlat Universiteti - Iqtisodiyot Fakulteti | Ta'lim yo'nalishlari</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-container"></div>
    
    <!-- Header -->
    <header id="header-container" class="header-container"></header>

    <!-- Academic Hero Section -->
    <section class="academic-hero">
        <div class="container">
            <h1 class="page-title animate-on-scroll" data-i18n="academic_page_title">Ta'lim yo'nalishlari</h1>
            <p class="page-subtitle animate-on-scroll" data-i18n="academic_page_subtitle">Bakalavriat va Magistratura dasturlari</p>
        </div>
        <div class="hero-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </section>

    <!-- Academic Levels -->
    <section class="academic-levels-section">
        <div class="container">
            <div class="academic-levels">
                <button class="level-btn active" onclick="showAcademicLevel('bachelor')">
                    <i class="fas fa-graduation-cap"></i>
                    <span data-i18n="bachelor">Bakalavriat</span>
                </button>
                <button class="level-btn" onclick="showAcademicLevel('master')">
                    <i class="fas fa-user-tie"></i>
                    <span data-i18n="master">Magistratura</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Academic Content - Bakalavriat -->
    <section id="bachelor-content" class="academic-content active">
        <div class="container">
            <h2 class="section-title" data-i18n="academic_bachelor_forms">Bakalavriat ta'lim shakllari</h2>
            <p class="section-subtitle" data-i18n="academic_bachelor_forms_subtitle">O'zingizga qulay ta'lim shaklini tanlang va kelajagingizni belgilang</p>
            
            <div class="bachelor-forms-grid" id="bachelor-forms-container">
                <!-- Form cards will be loaded by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Academic Content - Magistratura -->
    <section id="master-content" class="academic-content">
        <div class="container">
            <h2 class="section-title" data-i18n="academic_master_programs">Magistratura yo'nalishlari</h2>
            <p class="section-subtitle" data-i18n="academic_master_programs_subtitle">Ilmiy va kasbiy rivojlanish uchun eng yaxshi tanlov</p>
            
            <div class="master-programs-grid" id="master-programs-container">
                <!-- Master programs will be loaded by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Programs Modal (for detailed view) -->
    <div id="program-modal" class="academic-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close-btn" onclick="closeProgramModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Program details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer-container"></footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
    <script src="js/academic.js"></script>
</body>
</html>
